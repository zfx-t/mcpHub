services:
  server:
    build:
      context: .
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_BASE_URL: http://localhost:3000
      MCP_SERVER_URL: http://localhost:3000/mcp
      DATABASE_URL: postgres://mcphub:mcphub@postgres:5432/mcphub
      FETCH_TIMEOUT_MS: 10000
      FETCH_RATE_LIMIT_PER_MINUTE: 60
      MCPHUB_PLUGIN_DIR: ${MCPHUB_PLUGIN_DIR:-}
      SAMPLE_ADMIN_API_BASE_URL: ${SAMPLE_ADMIN_API_BASE_URL:-}
      SAMPLE_ADMIN_API_TOKEN_ENV: SAMPLE_ADMIN_API_TOKEN
      SAMPLE_ADMIN_API_TOKEN: ${SAMPLE_ADMIN_API_TOKEN:-}
      LOCAL_ADMIN_API_TOKEN: ${LOCAL_ADMIN_API_TOKEN:-}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${MCPHUB_PLUGIN_HOST_DIR:-./plugins}:/opt/mcphub/plugins:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mcphub
      POSTGRES_PASSWORD: mcphub
      POSTGRES_DB: mcphub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcphub -d mcphub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
