services:
  server:
    build:
      context: .
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_BASE_URL: http://localhost:3000
      MCP_SERVER_URL: http://localhost:3000/mcp
      DATABASE_URL: postgres://mcphub:mcphub@postgres:5432/mcphub
      FETCH_TIMEOUT_MS: 10000
      FETCH_RATE_LIMIT_PER_MINUTE: 60
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mcphub
      POSTGRES_PASSWORD: mcphub
      POSTGRES_DB: mcphub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcphub -d mcphub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
